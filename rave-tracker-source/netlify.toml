# Netlify build + deploy settings for the Vite app.
[build]
  command = "npm run build"
  publish = "dist"

# Serve the web app manifest with the correct content-type so Android Chrome
# recognizes it for installability.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Don't let the service worker get stuck in cache — always revalidate it.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Single-page app fallback: send all non-file routes to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
